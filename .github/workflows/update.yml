name: update-hk-data

  on:
    schedule:
      - cron: "0 12 * * 1-5"
    workflow_dispatch: {}

  permissions:
    contents: write

  concurrency:
    group: update-hk-data
    cancel-in-progress: false

  jobs:
    update:
      runs-on: ubuntu-latest
      timeout-minutes: 120
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
            cache: pip
        - name: Install deps
          run: pip install -r requirements.txt
        - name: Fetch HK data
          run: python fetch_hk.py
        - name: Commit & push snapshot
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            if git diff --staged --quiet; then
              echo "无变化,跳过提交"
            else
              git commit -m "data: $(TZ=Asia/Hong_Kong date +%F) 港股快照"
              git push
            fi
