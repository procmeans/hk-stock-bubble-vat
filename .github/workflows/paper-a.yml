name: paper-trading-a

on:
  schedule:
    - cron: "30 7 * * 1-5"   # UTC,A股收盘后
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: paper-trading-a
  cancel-in-progress: false

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      THS_HTTP_REFRESH_TOKEN: ${{ secrets.THS_HTTP_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install pandas numpy scipy requests

      - name: Run paper trading step (all A-share accounts)
        run: python -m strategies.paper run-market --market a

      - name: Commit & push state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add paper/
          git diff --cached --quiet || git commit -m "paper: a_alpha101 daily step $(date -u +%F)"
          git push
