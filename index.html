<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>港股市值 · 估值气泡缸</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  html,body{margin:0;height:100%;background:#0a0e1a;color:#e8eef7;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}
  #wrap{position:relative;width:100vw;height:100vh}
  canvas{display:block}
  #hd{position:absolute;top:16px;left:24px;z-index:5;pointer-events:none}
  #hd h1{margin:0;font-size:21px;font-weight:700;letter-spacing:1px}
  #hd p{margin:4px 0 0;font-size:12px;color:#8da2c0}
  #legend{position:absolute;top:16px;right:24px;z-index:5;font-size:12px;
    background:rgba(15,22,40,.6);padding:11px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
  #legend .row{display:flex;align-items:center;gap:8px;margin:4px 0}
  .swatch{width:12px;height:12px;border-radius:50%}
  #tip{position:absolute;z-index:10;pointer-events:none;display:none;
    background:rgba(10,15,28,.96);border:1px solid rgba(120,160,220,.4);border-radius:8px;
    padding:9px 12px;font-size:12.5px;line-height:1.6;box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:250px}
  #tip b{font-size:14px;color:#fff}.dim{color:#8da2c0}.pe{color:#ffd27d}
  .up{color:#ff6b6b}.down{color:#46d39a}
  #ctl{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;z-index:6;
    background:rgba(15,22,40,.75);border:1px solid rgba(255,255,255,.1);border-radius:12px;
    padding:10px 16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(6px)}
  #ctl button{background:#2b3a55;color:#e8eef7;border:none;border-radius:7px;
    padding:6px 12px;font-size:13px;cursor:pointer}
  #ctl button:hover{background:#37496a}
  #date{font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;min-width:96px;text-align:center}
  #slider{width:min(46vw,520px)}
  #mode{font-size:12px;cursor:pointer;color:#9fb4d4;user-select:none}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:20;font-size:15px;color:#9fb4d4;background:#0a0e1a}
</style>
</head>
<body>
<div id="wrap">
  <div id="hd">
    <h1>港股市值 · 估值气泡缸</h1>
    <p>气泡大小 = 总市值 &nbsp;|&nbsp; 越往上 PE 越高(越贵),缸底灰色为亏损股</p>
    <p id="stat" class="dim"></p>
  </div>
  <div id="legend">
    <div class="row"><span class="swatch" style="background:#ef5b25"></span>高 PE(贵 / 成长)</div>
    <div class="row"><span class="swatch" style="background:#5bd94a"></span>中 PE</div>
    <div class="row"><span class="swatch" style="background:#3f6fe0"></span>低 PE(便宜 / 价值)</div>
    <div class="row"><span class="swatch" style="background:#6b7a90"></span>亏损(PE≤0)</div>
    <div class="row dim" style="margin-top:7px">⌖ 圆面积 ∝ 市值 · 高度 ∝ PE</div>
  </div>
  <canvas id="cv"></canvas>
  <div id="tip"></div>
  <div id="ctl">
    <button id="play">▶ 播放</button>
    <span id="date">—</span>
    <input id="slider" type="range" min="0" max="0" value="0" step="1">
  </div>
  <div id="loading">正在加载数据…</div>
</div>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d'), tip=document.getElementById('tip');
let W,H,dpr=Math.min(window.devicePixelRatio||1,2);
let vat={}, nodes=[], byDate={}, dates=[], idx=0, playing=false, timer=null;

function computeVat(){
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const padX=Math.max(24,W*0.04), top=86, bot=H-74;
  vat={x0:padX,x1:W-padX,top,bot,rim:top+30}; vat.w=vat.x1-vat.x0;
}

// ---- 数据加载 ----
async function load(){
  const man=await (await fetch('data/manifest.json?t='+Date.now())).json();
  dates=man.dates.slice(-90);            // 最多保留最近 90 天
  const arrs=await Promise.all(dates.map(d=>fetch('data/'+d+'.json').then(r=>r.json())));
  dates.forEach((d,i)=>{ byDate[d]=new Map(arrs[i].map(o=>[o.code,o])); });
  // 全部出现过的公司并集做节点
  const seen=new Map();
  arrs.flat().forEach(o=>{ if(!seen.has(o.code)) seen.set(o.code,{code:o.code,name:o.name}); });
  nodes=[...seen.values()];
  computeVat();
  nodes.forEach(n=>{ n.x=(vat.x0+vat.x1)/2+(Math.random()-0.5)*vat.w*0.8; n.y=vat.rim+Math.random()*(vat.bot-vat.rim); });
  document.getElementById('loading').style.display='none';
  setupUI();
  idx=dates.length-1; applyDate(true);
  startSim();
}

// ---- 比例尺(随窗口/数据重算) ----
let rScale, yScale, colScale;
function buildScales(){
  const allMC=[]; Object.values(byDate).forEach(m=>m.forEach(o=>allMC.push(o.mc)));
  rScale=d3.scaleSqrt().domain([0,d3.max(allMC)]).range([1.8,52]);
  const peLo=1,peHi=150, yTop=vat.rim+40, ySedTop=vat.bot-(vat.bot-vat.rim)*0.20;
  yScale=d3.scaleLog().domain([peLo,peHi]).range([ySedTop-20,yTop]).clamp(true);
  colScale=d3.scaleSequential(t=>d3.interpolateTurbo(0.12+0.78*t)).domain([Math.log10(1),Math.log10(150)]);
}
function peToY(pe){ const ySedTop=vat.bot-(vat.bot-vat.rim)*0.20;
  return pe>0? yScale(Math.max(1,Math.min(150,pe))) : ySedTop+(vat.bot-ySedTop)*0.55; }

// 固定的静态配色:按 PE 高低冷→暖,亏损灰。天与天之间的变化通过气泡大小/高度的移动体现,颜色不做涨跌对比。
function colorOf(n){
  return n.loss ? '#6b7a90' : colScale(Math.log10(Math.max(1,Math.min(150,n.pe))));
}

// ---- 切换日期:更新每个节点状态,再加热力导向自然移动 ----
function applyDate(initial){
  buildScales();
  const cur=byDate[dates[idx]], prev= idx>0? byDate[dates[idx-1]] : null;
  let nViz=0,nLoss=0;
  for(const n of nodes){
    const o=cur.get(n.code);
    if(!o){ n.viz=false; n.r=0; continue; }
    n.viz=true; nViz++; n.pe=o.pe; n.mc=o.mc; n.rev=o.rev; n.profit=o.profit; n.cur=o.cur; n.name=o.name;
    n.r=rScale(o.mc); n.ty=peToY(o.pe); n.loss=o.pe<=0; if(n.loss)nLoss++;
    const p=prev&&prev.get(n.code);
    n.chg = p? (o.mc-p.mc)/p.mc : null;
  }
  computeLabels();
  document.getElementById('date').textContent=dates[idx];
  document.getElementById('slider').value=idx;
  document.getElementById('stat').textContent=
    `${dates[idx]}  ·  共 ${nViz} 家  ·  盈利 ${nViz-nLoss}  ·  亏损 ${nLoss}`;
  if(sim){ sim.alpha(initial?1:0.55).restart(); }
}

function vizSorted(){ return nodes.filter(n=>n.viz).sort((a,b)=>b.mc-a.mc); }
// 计算每个气泡能否在圈内放下名字:能放下就记字号 n.lf,字号自适应缩放,放不下则 lf=0
function computeLabels(){
  for(const n of nodes){
    n.lf=0;
    if(!n.viz || n.r<11) continue;
    const nm=n.name.replace(/－.+$/,'');
    let fs=Math.min(15, n.r*0.55);
    ctx.font=fs+'px "PingFang SC","Microsoft YaHei",sans-serif';
    const w=ctx.measureText(nm).width;
    if(w > 2*n.r-6) fs *= (2*n.r-6)/w;   // 缩小以塞进圆内
    if(fs>=7.5){ n.lf=fs; n.lname=nm; }   // 太小看不清就不显示
  }
}

// ---- 力导向 ----
let sim=null;
function boundary(){ for(const n of nodes){ if(!n.viz)continue; const r=n.r+1.2;
  if(n.x<vat.x0+r)n.x=vat.x0+r; if(n.x>vat.x1-r)n.x=vat.x1-r;
  if(n.y<vat.rim+r)n.y=vat.rim+r; if(n.y>vat.bot-r)n.y=vat.bot-r; } }
function startSim(){
  const cx=()=> (vat.x0+vat.x1)/2;
  sim=d3.forceSimulation(nodes)
    .force('y',d3.forceY(n=>n.ty||vat.rim).strength(0.16))
    .force('x',d3.forceX(cx).strength(0.012))
    .force('collide',d3.forceCollide(n=>n.r+1).strength(0.9).iterations(2))
    .alpha(1).alphaDecay(0.015).alphaMin(0.002)
    .on('tick',()=>{boundary();draw();});
}

function fmtMC(v){ return v>=10000?(v/10000).toFixed(2)+' 万亿':v.toFixed(0)+' 亿'; }
function fmtBig(v){ if(v==null)return '—'; const a=Math.abs(v);
  return a>=1e8?(v/1e8).toFixed(1)+' 亿':a>=1e4?(v/1e4).toFixed(1)+' 万':v.toFixed(0); }
function fmtPct(p){ if(p==null)return ''; const s=(p*100).toFixed(2); return (p>=0?'+':'')+s+'%'; }

function drawVat(){ const {x0,x1,rim,bot}=vat;
  const g=ctx.createLinearGradient(0,rim,0,bot);
  g.addColorStop(0,'rgba(60,120,200,0.10)');g.addColorStop(1,'rgba(30,70,140,0.22)');
  ctx.fillStyle=g; ctx.beginPath();
  ctx.moveTo(x0,rim);ctx.lineTo(x0,bot-30);ctx.quadraticCurveTo(x0,bot,x0+30,bot);
  ctx.lineTo(x1-30,bot);ctx.quadraticCurveTo(x1,bot,x1,bot-30);ctx.lineTo(x1,rim);
  ctx.closePath();ctx.fill();
  const sedTop=bot-(bot-rim)*0.20;
  ctx.fillStyle='rgba(70,80,100,0.10)';ctx.beginPath();
  ctx.moveTo(x0,sedTop);ctx.lineTo(x1,sedTop);ctx.lineTo(x1,bot-30);
  ctx.quadraticCurveTo(x1,bot,x1-30,bot);ctx.lineTo(x0+30,bot);
  ctx.quadraticCurveTo(x0,bot,x0,bot-30);ctx.closePath();ctx.fill();
}
function drawGlass(){ const {x0,x1,top,bot}=vat;
  ctx.lineWidth=2.5;ctx.strokeStyle='rgba(150,190,240,0.55)';ctx.beginPath();
  ctx.moveTo(x0,top);ctx.lineTo(x0,bot-30);ctx.quadraticCurveTo(x0,bot,x0+30,bot);
  ctx.lineTo(x1-30,bot);ctx.quadraticCurveTo(x1,bot,x1,bot-30);ctx.lineTo(x1,top);ctx.stroke();
  ctx.beginPath();ctx.ellipse((x0+x1)/2,top,(x1-x0)/2,15,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,210,250,0.75)';ctx.stroke();
  ctx.fillStyle='rgba(120,170,230,0.08)';ctx.fill();
  ctx.beginPath();ctx.moveTo(x0+18,top+30);ctx.lineTo(x0+18,bot-40);
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=8;ctx.stroke();
}
function draw(){
  ctx.clearRect(0,0,W,H); drawVat();
  for(const n of nodes){ if(!n.viz||n.r<=0)continue;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=colorOf(n);ctx.globalAlpha=n.loss?0.55:0.82;ctx.fill();
    if(n.r>6){ctx.globalAlpha=0.5;ctx.lineWidth=0.8;ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.stroke();}
    ctx.globalAlpha=1;
  }
  ctx.fillStyle='rgba(255,255,255,0.96)';ctx.textAlign='center';ctx.textBaseline='middle';
  for(const n of nodes){ if(n.viz&&n.lf){ ctx.font=n.lf+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(n.lname,n.x,n.y);} }
  drawGlass();
}

// ---- UI ----
function setupUI(){
  const sl=document.getElementById('slider');
  sl.max=dates.length-1; sl.value=dates.length-1;
  sl.oninput=()=>{ idx=+sl.value; applyDate(false); };
  document.getElementById('play').onclick=togglePlay;
}
function togglePlay(){
  const btn=document.getElementById('play');
  if(playing){ clearInterval(timer); playing=false; btn.textContent='▶ 播放'; return; }
  if(dates.length<2){ return; }
  playing=true; btn.textContent='⏸ 暂停';
  if(idx>=dates.length-1) idx=0;
  timer=setInterval(()=>{ if(idx>=dates.length-1){ clearInterval(timer);playing=false;btn.textContent='▶ 播放';return; }
    idx++; applyDate(false); }, 1400);
}

// ---- 悬停 ----
cv.addEventListener('mousemove',e=>{ const mx=e.clientX,my=e.clientY; let hit=null,best=1e9;
  for(const n of nodes){ if(!n.viz)continue; const dx=n.x-mx,dy=n.y-my,dd=dx*dx+dy*dy;
    if(dd<(n.r+2)*(n.r+2)&&dd<best){best=dd;hit=n;} }
  if(hit){ tip.style.display='block';tip.style.left=Math.min(mx+14,W-260)+'px';tip.style.top=(my+14)+'px';
    const chg = hit.chg==null? '' : ` <span class="dim">较前一日 ${fmtPct(hit.chg)}</span>`;
    tip.innerHTML=`<b>${hit.name}</b> <span class="dim">${hit.code}</span><br>`+
      `市值:<b>${fmtMC(hit.mc)}</b> ${hit.cur}${chg}<br>`+
      `PE(TTM):<span class="pe">${hit.pe}</span>${hit.pe<=0?' <span class="dim">(亏损)</span>':''}<br>`+
      `<span class="dim">营收 ${fmtBig(hit.rev)} · 净利 ${fmtBig(hit.profit)}</span>`;
  } else tip.style.display='none';
});
cv.addEventListener('mouseleave',()=>tip.style.display='none');

addEventListener('resize',()=>{ computeVat(); applyDate(false);
  if(sim) sim.force('x',d3.forceX((vat.x0+vat.x1)/2).strength(0.012)).alpha(0.5).restart(); });

load().catch(e=>{ document.getElementById('loading').textContent='加载失败:'+e; });
</script>
</body>
</html>
